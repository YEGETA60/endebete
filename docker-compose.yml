version: '3.8'

services:
  app:
    build: .
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=production
      - PORT=3333
      - DATABASE_URL=postgres://postgres:postgres@db:5432/endebete
      - JWT_SECRET=change_this_jwt_secret_in_production_32bytes
      - VAPID_PUBLIC_KEY=BGf17y-frKrDHA6OH_xW-57pTMJ4mQkBwEXyF9iTKZvin8ANDfbbUO4ADtSlQRXeDCIfpifl-xFpU1zm4Y-7iBg
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: endebete
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d endebete"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
